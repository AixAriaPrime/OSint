version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://...
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=omnitrace
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  pgbouncer:
    image: bitnami/pgbouncer
    ports:
      - "6432:6432"

volumes:
  postgres_data:
